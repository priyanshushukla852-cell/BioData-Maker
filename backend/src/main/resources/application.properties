spring.application.name=backend

# Database (Railway injects these via its Postgres plugin's env vars at deploy time)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/biodataai}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.locations=classpath:db/migration

# Firebase Admin SDK (set once a Firebase project + service account exist; both blank = auth disabled).
# Production (Railway): paste the service-account JSON into the FIREBASE_SERVICE_ACCOUNT_JSON secret var.
# Local dev: point FIREBASE_SERVICE_ACCOUNT_PATH at a JSON file on disk. JSON takes precedence over path.
firebase.service-account-json=${FIREBASE_SERVICE_ACCOUNT_JSON:}
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:}

# Gemini 2.5 Flash (server-side only, per CLAUDE.md hard architecture rule)
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=gemini-2.5-flash
gemini.base-url=https://generativelanguage.googleapis.com/v1beta

# Resilience4j: Gemini calls degrade gracefully instead of cascading into 500s.
resilience4j.circuitbreaker.instances.gemini.sliding-window-size=10
resilience4j.circuitbreaker.instances.gemini.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.gemini.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.gemini.permitted-number-of-calls-in-half-open-state=3
resilience4j.retry.instances.gemini.max-attempts=2
resilience4j.retry.instances.gemini.wait-duration=300ms

# Connection pool (HikariCP): sized for Railway's multi-instance setup
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Actuator: only /health is exposed publicly (used by Railway's health-check-based deploys).
# Liveness: /health/live (is the app running?)
# Readiness: /health/ready (is the app ready to accept traffic?)
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
